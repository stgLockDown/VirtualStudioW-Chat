name: Build Launcher EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'launcher/**'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      - name: Install dependencies
        working-directory: launcher
        run: npm ci

      - name: Build portable EXE
        working-directory: launcher
        run: npx electron-builder --win portable --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact
        working-directory: launcher/dist
        run: |
          $exe = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            $version = (Get-Content ../package.json | ConvertFrom-Json).version
            $newName = "VirtualStudio-$version-Portable.exe"
            Rename-Item $exe.FullName $newName
            Write-Output "Built: $newName ($([math]::Round($exe.Length / 1MB, 1)) MB)"
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualStudio-Portable-EXE
          path: launcher/dist/*.exe
          retention-days: 90

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: launcher/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}